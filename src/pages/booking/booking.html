<!DOCTYPE html>
<html lang="sv">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Boka kurs - WestCoast Education" />
    <link rel="stylesheet" href="../../assets/site.css" />
    <title>WestCoast Education | Boka kurs</title>
  </head>
  <body>
    <header>
      <nav>
        <div class="container">
          <ul class="menu">
            <li class="logo">
              <a href="../../index.html">WestCoast Education</a>
            </li>
            <li class="toggle">
             <input class="menu-btn" type="checkbox" id="menu-btn" />
            <label class="menu-icon" for="menu-btn">
             <span class="nav-icon"></span>
             </label>
            </li>
            <li class="menu-item">
              <a href="../../index.html">Start</a>
            </li>
            <li class="menu-item">
              <a href="../courses/courses.html">Kurser</a>
            </li>
            <li class="menu-item">
              <a href="../admin/admin.html">Admin</a>
            </li>
          </ul>
        </div>
      </nav>
    </header>
    <main>
      <article>
        <section class="container">
          <h1>Boka kurs</h1>
          <div id="course-summary"></div>
          <form id="booking-form">
            <div class="form-group">
              <label for="name">Namn</label>
              <input type="text" id="name" name="name" placeholder="Ditt namn" required />
            </div>
            <div class="form-group">
              <label for="address">Fakturaadress</label>
              <input type="text" id="address" name="address" placeholder="Din fakturaadress" required />
            </div>
            <div class="form-group">
              <label for="email">E-postadress</label>
              <input type="email" id="email" name="email" placeholder="Din e-postadress" required />
            </div>
            <div class="form-group">
              <label for="phone">Mobilnummer</label>
              <input type="tel" id="phone" name="phone" placeholder="Ditt mobilnummer" required />
            </div>
            <div class="form-group">
              <label>Kurstyp</label>
              <div id="course-type"></div>
            </div>
            <button type="submit" class="btn">Boka nu</button>
          </form>
        </section>
      </article>
    </main>
    <footer>
      <div class="container">
        <p>&copy; 2025 WestCoast Education</p>
      </div>
    </footer>
    <script src="./booking.js" type="module"></script>
  </body>
</html>
